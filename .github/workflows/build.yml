name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Go to isolade directory
        run: cd isolade && pwd
      
      - name: Grant execute permission
        run: chmod +x isolade/gradlew
      
      - name: Build Debug APK
        run: |
          cd isolade
          ./gradlew assembleDebug
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: isolade-APK
          path: isolade/app/build/outputs/apk/debug/*.apk
